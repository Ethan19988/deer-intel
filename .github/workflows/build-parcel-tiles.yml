name: Build parcel tiles

# Rebuilds the statewide land-owner vector tiles (pa-parcels.pmtiles) that the
# "Land Owners" map overlay renders, uploads them to Cloudflare R2 (the bucket
# the app streams from), and also keeps a copy on the `parcel-tiles` GitHub
# Release as a versioned backup. tippecanoe only runs on Linux, so this is the
# supported way to regenerate the archive (it can't be built on Windows).
#
# Run it manually from the Actions tab (workflow_dispatch). A monthly schedule
# is included but commented out — the output is a large binary, so enable it
# only if you want an automatic data refresh.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month

permissions:
  # Uploading the release asset needs contents: write.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install
          tippecanoe --version

      - name: Build parcel tiles
        working-directory: deer-intel-v2
        env:
          # No proxy on GitHub runners; fetch the county services directly.
          NODE_USE_ENV_PROXY: "0"
        run: bash scripts/build-parcel-tiles.sh

      - name: Publish tiles to R2 (live) and the release (backup)
        env:
          GH_TOKEN: ${{ github.token }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # aws-cli v2 adds default integrity checksums R2 rejects; scope them.
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: deer-intel-tiles
        run: |
          set -euo pipefail
          file="deer-intel-v2/public/data/pa-parcels.pmtiles"
          if [ ! -s "$file" ]; then
            echo "ERROR: $file missing or empty — build produced no tiles." >&2
            exit 1
          fi
          size="$(du -h "$file" | cut -f1)"

          # Primary: upload to the R2 bucket the app streams from (CORS + range).
          aws s3 cp "$file" "s3://${R2_BUCKET}/pa-parcels.pmtiles" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/octet-stream

          # Backup: keep a versioned copy on the GitHub Release.
          gh release upload parcel-tiles "$file" --clobber --repo "${{ github.repository }}"

          {
            echo "## Parcel tiles refreshed (${size})"
            echo ""
            echo "Uploaded to R2 (\`${R2_BUCKET}/pa-parcels.pmtiles\`, live) and the \`parcel-tiles\` release (backup)."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Published ${size} to R2 + release"
