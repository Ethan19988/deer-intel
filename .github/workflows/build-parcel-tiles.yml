name: Build parcel tiles

# Rebuilds the statewide land-owner vector tiles (pa-parcels.pmtiles) that the
# "Land Owners" map overlay renders, and uploads them to the `parcel-tiles`
# GitHub Release asset — which the app streams live via the same-origin
# /api/parcel-tiles proxy. tippecanoe only runs on Linux, so this is the
# supported way to regenerate the archive (it can't be built on Windows).
#
# Run it manually from the Actions tab (workflow_dispatch). A monthly schedule
# is included but commented out — the output is a large binary, so enable it
# only if you want an automatic data refresh.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month

permissions:
  # Uploading the release asset needs contents: write.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install
          tippecanoe --version

      - name: Build parcel tiles
        working-directory: deer-intel-v2
        env:
          # No proxy on GitHub runners; fetch the county services directly.
          NODE_USE_ENV_PROXY: "0"
        run: bash scripts/build-parcel-tiles.sh

      - name: Upload tiles to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          file="deer-intel-v2/public/data/pa-parcels.pmtiles"
          if [ ! -s "$file" ]; then
            echo "ERROR: $file missing or empty — build produced no tiles." >&2
            exit 1
          fi

          size="$(du -h "$file" | cut -f1)"
          # The app serves this asset live via /api/parcel-tiles; --clobber
          # replaces it in place so the URL stays stable.
          gh release upload parcel-tiles "$file" --clobber --repo "${{ github.repository }}"

          {
            echo "## Parcel tiles refreshed (${size})"
            echo ""
            echo "Replaced the \`parcel-tiles\` release asset — now live via /api/parcel-tiles."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Uploaded ${size} to release parcel-tiles"
