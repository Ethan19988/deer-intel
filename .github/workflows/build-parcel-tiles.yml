name: Build parcel tiles

# Rebuilds the statewide land-owner vector tiles (deer-intel-v2/public/data/
# pa-parcels.pmtiles) that the "Land Owners" map overlay renders, pushes them to
# a branch, and links a PR to open. tippecanoe only runs on Linux, so this is
# the supported way to regenerate the archive (it can't be built on Windows).
#
# Run it manually from the Actions tab (workflow_dispatch). A monthly schedule
# is included but commented out — the output is a large binary, so enable it
# only if you want an automatic data refresh.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 6 1 * *" # 06:00 UTC on the 1st of each month

permissions:
  # Only need to push the tiles branch; the PR is opened manually from the link.
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tippecanoe
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev
          git clone --depth 1 https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          make -C /tmp/tippecanoe -j"$(nproc)"
          sudo make -C /tmp/tippecanoe install
          tippecanoe --version

      - name: Build parcel tiles
        working-directory: deer-intel-v2
        env:
          # No proxy on GitHub runners; fetch the county services directly.
          NODE_USE_ENV_PROXY: "0"
        run: bash scripts/build-parcel-tiles.sh

      - name: Push refreshed tiles and link a PR
        run: |
          set -euo pipefail
          # *.pmtiles is tracked via Git LFS (.gitattributes); make sure the
          # filter is active so the refreshed tile is stored as an LFS object.
          git lfs install --local
          file="deer-intel-v2/public/data/pa-parcels.pmtiles"

          if git diff --quiet -- "$file"; then
            echo "Parcel tiles unchanged — nothing to push."
            exit 0
          fi

          branch="auto/parcel-tiles-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$file"
          git commit -m "Rebuild statewide parcel tiles (pa-parcels.pmtiles)"
          git push -u origin "$branch"

          # A repo without "Actions can create PRs" can't open the PR from CI, so
          # just surface the compare link for a one-click manual PR.
          size="$(du -h "$file" | cut -f1)"
          base="${{ github.event.repository.default_branch }}"
          url="${{ github.server_url }}/${{ github.repository }}/compare/${base}...${branch}?expand=1"
          {
            echo "## Parcel tiles rebuilt (${size})"
            echo ""
            echo "Pushed to branch \`${branch}\`."
            echo ""
            echo "[Open a pull request →](${url})"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Open a PR: ${url}"
