name: Upload tiles to R2

# One-shot (and reusable) job that copies the current parcel tiles to the
# Cloudflare R2 bucket the app streams from. It pulls the existing archive from
# the `parcel-tiles` GitHub Release (no rebuild) and uploads it to R2 via the
# S3 API. Run manually from the Actions tab.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  R2_BUCKET: deer-intel-tiles
  TILE_KEY: pa-parcels.pmtiles

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download tile from the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release download parcel-tiles \
            --repo "${{ github.repository }}" \
            --pattern "${TILE_KEY}" \
            --output "${TILE_KEY}"
          ls -la "${TILE_KEY}"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # aws-cli v2 adds default integrity checksums R2 rejects; scope them.
          AWS_REQUEST_CHECKSUM_CALCULATION: WHEN_REQUIRED
          AWS_RESPONSE_CHECKSUM_VALIDATION: WHEN_REQUIRED
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          aws s3 cp "${TILE_KEY}" "s3://${R2_BUCKET}/${TILE_KEY}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/octet-stream
          echo "Uploaded ${TILE_KEY} to r2://${R2_BUCKET}"
